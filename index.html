<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartLand AI — Геоаналитикалық платформа</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#040810;--surface:#080f1e;--card:#0d1628;--border:#1a2540;--accent:#00e5a0;--accent2:#0af;--accent3:#f5c518;--danger:#ff4560;--text:#e8f0fe;--muted:#5a7090;--nav-h:60px;--panel-w:390px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}

/* NAV */
nav{height:var(--nav-h);background:rgba(8,15,30,0.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:1000;flex-shrink:0;backdrop-filter:blur(20px);position:relative}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.35}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 18px rgba(0,229,160,0.35);animation:logoPulse 3s ease infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 0 18px rgba(0,229,160,0.3)}50%{box-shadow:0 0 32px rgba(0,229,160,0.6)}}
.logo-text{font-family:'Orbitron',sans-serif;font-size:0.95rem;font-weight:900;letter-spacing:0.03em}
.logo-text span{color:var(--accent)}
.logo-badge{font-size:0.48rem;font-family:'Orbitron',sans-serif;color:var(--accent3);border:1px solid var(--accent3);border-radius:4px;padding:2px 5px;letter-spacing:0.1em;animation:badgeBlink 2s ease infinite}
@keyframes badgeBlink{0%,100%{opacity:1}50%{opacity:0.45}}

.map-switcher{display:flex;gap:3px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:9px;padding:3px;margin-left:15px}
.map-btn{padding:5px 12px;border:none;border-radius:6px;background:transparent;color:var(--muted);font-size:0.68rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.map-btn.active{background:linear-gradient(135deg,var(--accent),#00b87a);color:#040810}

.draw-tools{display:flex;gap:4px;margin-left:10px}
.draw-btn{padding:5px 11px;border:1px solid var(--border);border-radius:7px;background:rgba(0,0,0,0.3);color:var(--muted);font-size:0.68rem;font-weight:700;cursor:pointer}
.draw-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.draw-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.08)}

.coord-search{display:flex;gap:5px;margin-left:auto;align-items:center}
.coord-input{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.65rem;padding:6px 9px;width:110px}

.user-btn{display:flex;align-items:center;gap:7px;padding:5px 12px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:0.68rem;font-weight:600;cursor:pointer}
.u-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.u-dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent)}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - var(--nav-h));position:relative}
#map{flex:1;background:#0d1628}

#panel{width:var(--panel-w);background:rgba(8,15,30,0.97);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-tab{flex:1;padding:13px 6px;text-align:center;font-size:0.6rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase}
.panel-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,229,160,0.04)}

.tab-pane{display:none;flex:1;overflow-y:auto;padding:14px}
.tab-pane.active{display:flex;flex-direction:column}

/* COMPONENTS */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:15px;color:var(--muted)}
.empty-icon{font-size:2.5rem;opacity:0.3}

.cat-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:15px}
.cat-dominant{display:flex;align-items:center;gap:12px;margin-bottom:15px}
.cat-icon-big{width:46px;height:46px;background:rgba(0,229,160,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.cat-percent-big{font-family:'Orbitron';font-size:1.6rem;font-weight:900;margin-left:auto;color:var(--accent)}

.cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-bar-track{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;transition:width 1s ease}

.sec-title{font-size:0.6rem;font-weight:700;color:var(--accent2);text-transform:uppercase;margin:15px 0 10px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:12px;background:var(--accent2);border-radius:2px}

.pop-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.pop-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.65rem}
.pop-val.hl{color:var(--accent);font-weight:700}

.ai-block{background:linear-gradient(135deg,rgba(0,170,255,0.1),rgba(0,229,160,0.05));border:1px solid rgba(0,170,255,0.2);border-radius:12px;padding:15px;margin-top:10px}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;color:var(--accent2);font-weight:700;font-size:0.75rem}

/* MODAL & TOAST */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);padding:30px;border-radius:15px;width:320px;display:flex;flex-direction:column;gap:15px}
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:10000}
.toast{background:var(--card);border:1px solid var(--accent);padding:10px 20px;border-radius:8px;margin-top:10px;font-size:0.7rem;animation:slideIn 0.3s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>
</head>
<body>

<nav>
    <a class="logo" href="#">
        <div class="logo-icon">🌿</div>
        <div class="logo-text">Smart<span>Land</span></div>
        <div class="logo-badge">AI</div>
    </a>
    <div class="map-switcher">
        <button class="map-btn active" onclick="switchMap('dark',this)">🌑 Түнгі</button>
        <button class="map-btn" onclick="switchMap('satellite',this)">🛰 Жерсерік</button>
        <button class="map-btn" onclick="switchMap('osm',this)">🗺 Көше</button>
    </div>
    <div class="draw-tools">
        <button class="draw-btn" id="btn-polygon" onclick="startDraw('polygon')">⬡ Учаскені белгілеу</button>
        <button class="draw-btn" onclick="clearAll()">🗑 Тазалау</button>
    </div>
    <div class="coord-search">
        <input class="coord-input" id="inp-lat" placeholder="Ендік">
        <input class="coord-input" id="inp-lng" placeholder="Бойлық">
        <button class="draw-btn" onclick="goToCoords()" style="background:var(--accent);color:#000;border:none">Табу</button>
    </div>
    <div class="user-btn" onclick="openModal()" style="margin-left:15px">
        <div class="u-dot" id="u-dot"></div>
        <span id="u-label">Кіру</span>
    </div>
</nav>

<div class="main">
    <div id="map"></div>
    <div id="panel">
        <div class="panel-tabs">
            <div class="panel-tab active" onclick="switchTab('analysis',this)">📊 Талдау</div>
            <div class="panel-tab" onclick="switchTab('layers',this)">🗂 Қабаттар</div>
            <div class="panel-tab" onclick="switchTab('add',this)">➕ Қосу</div>
        </div>

        <div class="tab-pane active" id="tab-analysis">
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">🌍</div>
                <div class="empty-title">Учаскені таңдаңыз</div>
                <p>Картадағы нүктені басыңыз немесе полигон салыңыз</p>
            </div>
            <div id="analysis-content" style="display:none;"></div>
        </div>

        <div class="tab-pane" id="tab-layers">
            <div id="layers-list"></div>
        </div>

        <div class="tab-pane" id="tab-add">
            <p style="font-size:0.7rem; color:var(--muted); margin-bottom:15px">Объектіні картаға қосу үшін алдымен оны белгілеңіз.</p>
            <input class="coord-input" id="add-name" placeholder="Объект атауы" style="width:100%; margin-bottom:10px; padding:10px">
            <button class="draw-btn" onclick="saveObject()" style="width:100%; padding:12px; background:var(--accent); color:#000">💾 Сақтау</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="login-modal">
    <div class="modal">
        <h3 style="color:var(--accent)">SmartLand AI Кіру</h3>
        <input class="coord-input" id="m-login" placeholder="Логин" style="width:100%; padding:10px">
        <input class="coord-input" id="m-pass" type="password" placeholder="Құпиясөз" style="width:100%; padding:10px">
        <button class="draw-btn" onclick="doLogin()" style="background:var(--accent); color:#000; padding:12px">Кіру</button>
        <button class="draw-btn" onclick="closeModal()">Жабу</button>
    </div>
</div>

<div id="toast-wrap"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
    // ── Инициализация карты ──
    const map = L.map('map').setView([44.8488, 65.5092], 13);
    const tiles = {
        dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
        satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
        osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    };
    tiles.dark.addTo(map);

    let drawnItems = new L.FeatureGroup().addTo(map);
    let curLayer = 'dark';

    // ── Переключение карт ──
    function switchMap(t, btn) {
        map.removeLayer(tiles[curLayer]);
        tiles[t].addTo(map);
        curLayer = t;
        document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ── Анализ при клике ──
    map.on('click', function(e) {
        if(isDrawing) return;
        showLoading();
        analyzeArea(e.latlng.lat, e.latlng.lng);
    });

    function showLoading() {
        document.getElementById('empty-state').style.display = 'none';
        const content = document.getElementById('analysis-content');
        content.style.display = 'block';
        content.innerHTML = '<div style="text-align:center; padding:20px">⌛ ИИ деректерді өңдеуде...</div>';
    }

    async function analyzeArea(lat, lng) {
        try {
            const response = await fetch(`/api/analyze?lat=${lat}&lng=${lng}`);
            const data = await response.json();
            renderUI(data.data);
        } catch (err) {
            // Запасные данные если сервер недоступен (как на твоем дизайне)
            const mockData = {
                population: 334,
                buildings: 31,
                dominant: { name: 'Өндіретін жер', icon: '🌾', color: '#4CAF50', pct: 36, desc: 'Сегіз жер санаты бойынша басым санат' },
                breakdown: [
                    { name: 'Өндіретін жер', icon: '🌾', pct: 36, color: '#4CAF50' },
                    { name: 'Өндіктеме', icon: '🐏', pct: 24, color: '#8BC34A' },
                    { name: 'Ғимараттар', icon: '🏢', pct: 15, color: '#9E9E9E' },
                    { name: 'Суды жер', icon: '🌊', pct: 3, color: '#1976D2' }
                ],
                ai_text: "Бұл учаске ауыл шаруашылығы үшін өте қолайлы. Топырақ ылғалдылығы жоғары және жақын жерде су көздері бар."
            };
            renderUI(mockData);
        }
    }

    function renderUI(d) {
        const content = document.getElementById('analysis-content');
        let breakdownHtml = d.breakdown.map(c => `
            <div class="cat-bar-row">
                <span style="font-size:0.8rem; width:20px">${c.icon}</span>
                <span style="font-size:0.6rem; flex:1">${c.name}</span>
                <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${c.pct}%; background:${c.color}"></div></div>
                <span style="font-size:0.55rem; width:25px; text-align:right">${c.pct}%</span>
            </div>
        `).join('');

        content.innerHTML = `
            <div class="cat-block">
                <div class="cat-dominant">
                    <div class="cat-icon-big">${d.dominant.icon}</div>
                    <div>
                        <div class="cat-dominant-name">${d.dominant.name}</div>
                        <div style="font-size:0.55rem; color:var(--muted)">${d.dominant.desc}</div>
                    </div>
                    <div class="cat-percent-big">${d.dominant.pct}%</div>
                </div>
                ${breakdownHtml}
            </div>
            
            <div class="sec-title">Аудан статистикасы</div>
            <div class="pop-block">
                <div class="pop-row"><span>Халық саны</span><span class="pop-val hl">${d.population} адам</span></div>
                <div class="pop-row"><span>Ғимараттар</span><span class="pop-val hl">${d.buildings}</span></div>
            </div>

            <div class="ai-block">
                <div class="ai-header">✨ SmartLand AI Қорытындысы</div>
                <div style="font-size:0.65rem; line-height:1.6">${d.ai_text}</div>
            </div>
        `;
    }

    // ── Рисование ──
    let isDrawing = false;
    function startDraw(type) {
        isDrawing = true;
        document.getElementById('btn-polygon').classList.add('active');
        const drawHandler = type === 'polygon' ? new L.Draw.Polygon(map) : new L.Draw.Marker(map);
        drawHandler.enable();
    }

    map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.addLayer(e.layer);
        isDrawing = false;
        document.getElementById('btn-polygon').classList.remove('active');
        toast("Учаске сәтті белгіленді!", "success");
    });

    function clearAll() {
        drawnItems.clearLayers();
        document.getElementById('analysis-content').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
    }

    // ── Утилиты ──
    function switchTab(t, btn) {
        document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + t).classList.add('active');
    }

    function goToCoords() {
        const lat = document.getElementById('inp-lat').value;
        const lng = document.getElementById('inp-lng').value;
        if(lat && lng) map.setView([lat, lng], 16);
    }

    function openModal() { document.getElementById('login-modal').classList.add('show'); }
    function closeModal() { document.getElementById('login-modal').classList.remove('show'); }

    function toast(msg, type) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.getElementById('toast-wrap').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function doLogin() {
        document.getElementById('u-dot').classList.add('on');
        document.getElementById('u-label').innerText = document.getElementById('m-login').value || 'Пайдаланушы';
        closeModal();
        toast("Жүйеге сәтті кірдіңіз!", "success");
    }
</script>
</body>
</html>
