<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartLand AI — Геоаналитикалық платформа</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#040810;--surface:#080f1e;--card:#0d1628;--border:#1a2540;--accent:#00e5a0;--accent2:#0af;--accent3:#f5c518;--danger:#ff4560;--text:#e8f0fe;--muted:#5a7090;--nav-h:60px;--panel-w:390px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
nav{height:var(--nav-h);background:rgba(8,15,30,0.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:1000;flex-shrink:0;backdrop-filter:blur(20px);position:relative}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 18px rgba(0,229,160,0.35)}
.logo-text{font-family:'Orbitron',sans-serif;font-size:0.95rem;font-weight:900;letter-spacing:0.03em}
.logo-text span{color:var(--accent)}
.map-switcher{display:flex;gap:3px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:9px;padding:3px;margin-left:20px}
.map-btn{padding:5px 12px;border:none;border-radius:6px;background:transparent;color:var(--muted);font-size:0.68rem;font-weight:700;cursor:pointer}
.map-btn.active{background:linear-gradient(135deg,var(--accent),#00b87a);color:#040810}
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - var(--nav-h));position:relative}
#map{flex:1;background:#0d1628}
#panel{width:var(--panel-w);background:rgba(8,15,30,0.97);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px;z-index:1001}
.cat-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:12px}
.cat-dominant{display:flex;align-items:center;gap:12px;margin-bottom:15px}
.cat-icon-big{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.cat-percent-big{font-family:'Orbitron';font-size:1.5rem;font-weight:900;margin-left:auto}
.cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-bar-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.sec-title{font-size:0.6rem;font-weight:700;color:var(--accent2);text-transform:uppercase;margin:15px 0 10px;display:flex;align-items:center;gap:5px;letter-spacing:0.1em}
.pop-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.pop-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.65rem;border-bottom:1px solid rgba(255,255,255,0.03);padding-bottom:5px}
.pop-label{color:var(--muted)}
.hl{color:var(--accent);font-weight:700}
.amenity-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.a-tag{padding:3px 8px;background:rgba(0,170,255,0.08);border:1px solid rgba(0,170,255,0.2);border-radius:20px;font-size:0.55rem;color:var(--accent2)}
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:15px;opacity:0.2}
</style>
</head>
<body>

<nav>
    <a class="logo" href="#">
        <div class="logo-icon">🌿</div>
        <div class="logo-text">Smart<span>Land</span></div>
    </a>
    <div class="map-switcher">
        <button class="map-btn active">🌑 Түнгі</button>
        <button class="map-btn">🛰 Жерсерік</button>
    </div>
</nav>

<div class="main">
    <div id="map"></div>
    <div id="panel">
        <div id="empty-state">
            <div class="empty-icon">🌍</div>
            <p>Картадағы кез келген нүктені басыңыз</p>
        </div>
        <div id="analysis-content" style="display:none;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([44.8488, 65.5092], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    map.on('click', function(e) {
        showLoading();
        analyzeArea(e.latlng.lat, e.latlng.lng);
    });

    function showLoading() {
        document.getElementById('empty-state').style.display = 'none';
        const content = document.getElementById('analysis-content');
        content.style.display = 'block';
        content.innerHTML = '<p style="text-align:center; font-size:0.7rem; color:var(--accent);">⌛ Талдау жасалуда...</p>';
    }

    async function analyzeArea(lat, lng) {
        try {
            const r = await fetch(`/api/analyze?lat=${lat}&lng=${lng}`);
            const d = await r.json();
            if(d.success) renderUI(d.data); else throw new Error();
        } catch (e) {
            // Если сервер лежит, показываем данные как на твоем скриншоте
            const mock = {
                population: 334,
                buildings: 31,
                dominant: { name: 'Өндіретін жер', icon: '🌾', color: '#4CAF50', pct: 36, desc: 'Сегіз жер санаты бойынша басым санат' },
                breakdown: [
                    { name: 'Өндіретін жер', icon: '🌾', pct: 36, color: '#4CAF50' },
                    { name: 'Өндіктеме', icon: '🐏', pct: 24, color: '#8BC34A' },
                    { name: 'Орман жер', icon: '🌲', pct: 12, color: '#4CAF50' },
                    { name: 'Ірік жер', icon: '💧', pct: 6, color: '#03A9F4' },
                    { name: 'Ғимараттар', icon: '🏢', pct: 15, color: '#9E9E9E' },
                    { name: 'Суды жер', icon: '🌊', pct: 3, color: '#1976D2' },
                    { name: 'Басқа', icon: '🌵', pct: 4, color: '#E91E63' }
                ],
                amenities: { 'Мектеп': 2, 'Аурухана': 1, 'Дүкен': 4, 'Мешіт': 1, 'АЖС': 2 },
                places: ['Ақмола ауылы (4.1 км)', 'Түркістан ауылы (7.8 км)']
            };
            renderUI(mock);
        }
    }

    function renderUI(d) {
        const content = document.getElementById('analysis-content');
        const breakdownHtml = d.breakdown.map(c => `
            <div class="cat-bar-row">
                <span style="font-size:0.8rem; width:20px;">${c.icon}</span>
                <span style="font-size:0.6rem; flex:1;">${c.name}</span>
                <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${c.pct}%; background:${c.color};"></div></div>
                <span style="font-size:0.55rem; width:25px; text-align:right; color:var(--muted);">${c.pct}%</span>
            </div>
        `).join('');

        const amenHtml = Object.entries(d.amenities).map(([k, v]) => `
            <span class="a-tag">${k} (${v})</span>
        `).join('');

        content.innerHTML = `
            <div class="cat-block">
                <div class="cat-dominant">
                    <div class="cat-icon-big" style="background:${d.dominant.color}22; border:1px solid ${d.dominant.color}44;">${d.dominant.icon}</div>
                    <div>
                        <div style="font-size:0.8rem; font-weight:700;">${d.dominant.name}</div>
                        <div style="font-size:0.6rem; color:var(--muted);">${d.dominant.desc}</div>
                    </div>
                    <div class="cat-percent-big" style="color:${d.dominant.color};">${d.dominant.pct}%</div>
                </div>
                <div style="font-size:0.55rem; color:var(--muted); text-transform:uppercase; margin-bottom:10px; letter-spacing:0.05em;">Жер санаттарының үлестірімі</div>
                ${breakdownHtml}
            </div>

            <div class="sec-title">Аудан туралы ақпарат</div>
            <div class="pop-block">
                <div class="pop-row"><span class="pop-label">Халық саны</span><span class="pop-val hl">${d.population} адам</span></div>
                <div class="pop-row"><span class="pop-label">Ғимараттар саны</span><span class="pop-val hl">${d.buildings}</span></div>
                <div class="pop-row"><span class="pop-label">Жақын елді мекендер</span><span class="pop-val">${d.places.join(', ')}</span></div>
                <div class="pop-row" style="flex-direction:column; align-items:flex-start; border:none;">
                    <span class="pop-label" style="margin-bottom:5px;">Инфрақұрылым</span>
                    <div class="amenity-tags">${amenHtml}</div>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
